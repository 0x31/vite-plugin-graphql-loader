name: Release

on:
    push:
        tags:
            - "v*"

jobs:
    release:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            id-token: write
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest
            - uses: actions/setup-node@v4
              with:
                  node-version: 22.x
                  registry-url: https://registry.npmjs.org
            # Node 22.x ships with npm 10.x. Trusted Publishing requires
            # npm >=11.5.1 — without this upgrade the publish 404s because
            # the CLI doesn't request an OIDC publish token.
            - run: npm install -g npm@latest
            - run: bun install --frozen-lockfile
            - run: bun run lint
            - run: bun run format:check
            - run: bun run typecheck
            - run: bun run test:run
            - run: bun run build
            - name: Integration test
              working-directory: integration-test
              run: |
                  bun install --no-frozen-lockfile
                  bun run test
            # Auth + signing both come from the GitHub Actions OIDC identity.
            # Requires Trusted Publishing to be configured for this package on npmjs.com.
            - run: npm publish --provenance --access public
            - name: Create GitHub Release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: gh release create "$GITHUB_REF_NAME" --generate-notes --verify-tag
